name: Provision S3 Bucket + DNS

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region (overrides vars.AWS_REGION)
        required: false

env:
  REGION:    ${{ inputs.region || vars.AWS_REGION || 'us-east-1' }}
  DOMAIN:    ${{ vars.DOMAIN    || 'joev.me' }}
  SUBDOMAIN: ${{ vars.SUBDOMAIN || 'contact' }}
  VCF:       ${{ vars.VCF_FILE  || 'joe_violago.vcf' }}

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Provision bucket and DNS
        run: |
          make provision \
            DOMAIN=${{ env.DOMAIN }} \
            SUBDOMAIN=${{ env.SUBDOMAIN }} \
            REGION=${{ env.REGION }} \
            VCF=${{ env.VCF }}
