name: Provision S3 Bucket + DNS

on:
  workflow_dispatch:
    inputs:
      region:
        description: AWS region (overrides config.env)
        required: false

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load config
        run: cat config.env >> $GITHUB_ENV

      - name: Override region if provided
        if: inputs.region != ''
        run: echo "AWS_REGION=${{ inputs.region }}" >> $GITHUB_ENV

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Provision bucket and DNS
        run: |
          make provision \
            DOMAIN=${{ env.DOMAIN }} \
            SUBDOMAIN=${{ env.SUBDOMAIN }} \
            REGION=${{ env.AWS_REGION }} \
            VCF=${{ env.VCF_FILE }}
